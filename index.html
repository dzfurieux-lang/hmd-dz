<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMD-DZ | THE BREACH HUNTER v24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --dz-green: #006233;
            --dz-red: #d21034;
            --card-bg: #1a1b26;
        }

        body {
            background-color: #0f1016;
            color: #a9b1d6;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
        }

        /* --- HEADER STYLE --- */
        .hmd-logo {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--dz-green) 40%, #fff 50%, var(--dz-red) 60%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
        }

        /* --- DESIGN DES FICHES (STYLE LEAK SITE) --- */
        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #24283b;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .result-card:hover { border-color: var(--dz-green); }

        .badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            margin-left: 8px;
        }
        .badge-blue { background: #3d59a1; color: #fff; }
        .badge-orange { background: #ff9e64; color: #000; }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-label { color: #565f89; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .data-value { color: #c0caf5; font-size: 0.9rem; font-weight: bold; }

        /* --- INPUTS --- */
        .hmd-input {
            background: #16161e !important;
            border: 1px solid #24283b !important;
            color: #c0caf5 !important;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            outline: none;
        }

        .hmd-input:focus { border-color: var(--dz-green); }

        .btn-strike {
            background: linear-gradient(90deg, var(--dz-green), var(--dz-red));
            color: white;
            font-weight: 800;
            padding: 18px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-strike:hover { filter: brightness(1.2); }

        /* --- LEAK TOOLS BUTTONS --- */
        .leak-btn {
            background: #24283b;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            margin-bottom: 8px;
            border-left: 4px solid var(--dz-red);
        }

        .leak-btn:hover { background: var(--dz-red); transform: translateX(5px); }
    </style>
</head>
<body>

    <div id="main-ui" class="max-w-7xl mx-auto p-4 md:p-10">
        
        <header class="text-center mb-16">
            <div class="flex justify-center gap-6 mb-4 text-4xl"><span>🇩🇿</span><span>🇦🇫</span></div>
            <h1 class="hmd-logo">HMD-DZ</h1>
            <p class="uppercase tracking-[0.5em] text-[10px] opacity-50">Breach & Intelligence Hunter • v24</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="lg:col-span-2 space-y-6">
                <div class="result-card">
                    <h3 class="text-xs font-bold mb-6 uppercase text-red-500"><i class="fa-solid fa-bolt mr-2"></i> Recherche Intensive</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="data-label">Prénom</label><input id="in-fn" class="hmd-input" placeholder="Hayat"></div>
                        <div><label class="data-label">Nom de Famille</label><input id="in-ln" class="hmd-input" placeholder="El Moussaoui"></div>
                        <div><label class="data-label">Ville / Code Postal</label><input id="in-ci" class="hmd-input" placeholder="Lille, 59000"></div>
                        <div><label class="data-label">Email / Pseudo</label><input id="in-con" class="hmd-input" placeholder="hayat101@hotmail.fr"></div>
                    </div>
                    <button onclick="hunt()" class="btn-strike mt-8">Lancer l'investigation breach</button>
                </div>
            </div>

            <div class="result-card">
                <h3 class="text-xs font-bold mb-6 uppercase text-green-500">Outils de Leaks</h3>
                <div id="leak-tools" class="space-y-2">
                    <p class="text-[10px] opacity-40 italic">Utilisez ces bases de données pour trouver les mails et adresses cachés.</p>
                </div>
            </div>
        </div>

        <div id="results-area" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 pb-40">
            </div>

    </div>

    <script>
        function hunt() {
            const i = {
                fn: document.getElementById('in-fn').value.trim(),
                ln: document.getElementById('in-ln').value.trim(),
                ci: document.getElementById('in-ci').value.trim(),
                con: document.getElementById('in-con').value.trim()
            };

            if(!i.fn && !i.con) return alert("Saisissez au moins un nom ou un email.");

            document.getElementById('results-area').classList.remove('hidden');
            const area = document.getElementById('results-area');
            const tools = document.getElementById('leak-tools');

            // --- 1. CRÉATION DE LA FICHE (STYLE "PRO") ---
            area.innerHTML = `
                <div class="result-card">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-indigo-900 rounded flex items-center justify-center font-bold text-white text-xl">
                                ${i.fn.charAt(0)}${i.ln.charAt(0)}
                            </div>
                            <div class="ml-4">
                                <div class="font-bold text-white uppercase">${i.fn} ${i.ln}</div>
                                <div class="text-[10px] opacity-50 italic">Source: OSINT_EXTRACTION</div>
                            </div>
                        </div>
                        <div class="flex">
                            <span class="badge badge-blue">RECHERCHE</span>
                            <span class="badge badge-orange">LIVE</span>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <div class="data-row"><span class="data-label">Identité</span><span class="data-value">${i.fn} ${i.ln}</span></div>
                        <div class="data-row"><span class="data-label">Localisation</span><span class="data-value">${i.ci || 'Recherche en cours...'}</span></div>
                        <div class="data-row"><span class="data-label">Email</span><span class="data-value">${i.con || 'Non détecté'}</span></div>
                        <div class="data-row"><span class="data-label">Source</span><span class="data-value text-red-500 font-bold italic">HMD-DZ CLOUD</span></div>
                    </div>
                    
                    <p class="mt-6 text-[10px] opacity-40 leading-relaxed">
                        Note: Les informations sensibles (Matricule CAF, mot de passe) ne peuvent être extraites que via les bases de données Breach ci-contre.
                    </p>
                </div>

                <div class="result-card">
                    <h3 class="text-xs font-bold mb-4 uppercase text-green-500">Pivots d'adresse et Tel</h3>
                    <a href="https://www.pagesjaunes.fr/pagesblanches/recherche?quoiqui=${i.fn}+${i.ln}&ou=${i.ci}" target="_blank" class="leak-btn">Extraire Adresse/Tel (PagesBlanches) <i class="fa-solid fa-map-pin"></i></a>
                    <a href="https://www.google.com/search?q=%22${i.fn}+${i.ln}%22+${i.ci}" target="_blank" class="leak-btn">Scanner Google Dorks <i class="fa-solid fa-search"></i></a>
                    <a href="https://www.social-searcher.com/search-users/?q=${i.fn}+${i.ln}" target="_blank" class="leak-btn">Tracker Réseaux Sociaux <i class="fa-solid fa-share-nodes"></i></a>
                </div>
            `;

            // --- 2. CONFIGURATION DES OUTILS DE LEAKS (LA CLÉ) ---
            tools.innerHTML = `
                <a href="https://breachdirectory.org/" target="_blank" class="leak-btn">Chercher dans BreachDirectory <i class="fa-solid fa-database"></i></a>
                <a href="https://leakcheck.io/" target="_blank" class="leak-btn">Scanner via LeakCheck <i class="fa-solid fa-unlock-keyhole"></i></a>
                <a href="https://epieos.com/?q=${i.con}" target="_blank" class="leak-btn">Tracker Email (Epieos) <i class="fa-solid fa-envelope"></i></a>
                <a href="https://facecheck.id/" target="_blank" class="leak-btn">Reconnaissance Faciale <i class="fa-solid fa-camera"></i></a>
            `;

            area.scrollIntoView({ behavior: 'smooth' });
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
